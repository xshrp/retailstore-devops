services:

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
 
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  catalog:
    build:
      context: ./src/catalog
    environment:
      GIN_MODE: ${GIN_MODE}
      RETAIL_CATALOG_PERSISTENCE_PROVIDER: ${RETAIL_CATALOG_PERSISTENCE_PROVIDER}
      RETAIL_CATALOG_PERSISTENCE_ENDPOINT: ${RETAIL_CATALOG_PERSISTENCE_ENDPOINT}
      RETAIL_CATALOG_PERSISTENCE_DB_NAME: ${RETAIL_CATALOG_PERSISTENCE_DB_NAME}
      RETAIL_CATALOG_PERSISTENCE_USER: ${RETAIL_CATALOG_PERSISTENCE_USER}
      RETAIL_CATALOG_PERSISTENCE_PASSWORD: ${RETAIL_CATALOG_PERSISTENCE_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

  carts:
    build:
      context: ./src/cart
    environment:
      CART_PERSISTENCE_PROVIDER: ${CART_PERSISTENCE_PROVIDER}
      CART_POSTGRES_HOST: ${CART_POSTGRES_HOST}
      CART_POSTGRES_PORT: ${CART_POSTGRES_PORT}
      CART_POSTGRES_DB: ${CART_POSTGRES_DB}
      CART_POSTGRES_USER: ${CART_POSTGRES_USER}
      CART_POSTGRES_PASSWORD: ${CART_POSTGRES_PASSWORD}
      PORT: ${CART_PORT}
    depends_on:
      db:
        condition: service_healthy

  orders:
    build:
      context: ./src/orders
    environment:
      GIN_MODE: ${GIN_MODE}
      RETAIL_ORDERS_PERSISTENCE_ENDPOINT: ${RETAIL_ORDERS_PERSISTENCE_ENDPOINT}
      RETAIL_ORDERS_PERSISTENCE_NAME: ${RETAIL_ORDERS_PERSISTENCE_NAME}
      RETAIL_ORDERS_PERSISTENCE_USERNAME: ${RETAIL_ORDERS_PERSISTENCE_USERNAME}
      RETAIL_ORDERS_PERSISTENCE_PASSWORD: ${RETAIL_ORDERS_PERSISTENCE_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

  checkout:
    build:
      context: ./src/checkout
    environment:
      RETAIL_CHECKOUT_PERSISTENCE_PROVIDER: ${RETAIL_CHECKOUT_PERSISTENCE_PROVIDER}
      RETAIL_CHECKOUT_PERSISTENCE_REDIS_URL: ${RETAIL_CHECKOUT_PERSISTENCE_REDIS_URL}
      RETAIL_CHECKOUT_ENDPOINTS_ORDERS: ${RETAIL_CHECKOUT_ENDPOINTS_ORDERS}
    depends_on:
      - redis
      - orders

  ui:
    build:
      context: ./src/ui
    environment:
      RETAIL_UI_ENDPOINTS_CATALOG:  ${RETAIL_UI_ENDPOINTS_CATALOG}
      RETAIL_UI_ENDPOINTS_CARTS:    ${RETAIL_UI_ENDPOINTS_CARTS}
      RETAIL_UI_ENDPOINTS_CHECKOUT: ${RETAIL_UI_ENDPOINTS_CHECKOUT}
      RETAIL_UI_ENDPOINTS_ORDERS:   ${RETAIL_UI_ENDPOINTS_ORDERS}
    ports:
      - "8080:8080"
    depends_on:
      - catalog
      - carts
      - orders
      - checkout

  admin:
    build:
      context: ./src/admin
    environment:
      DB_HOST: ${CART_POSTGRES_HOST}
      DB_PORT: ${CART_POSTGRES_PORT}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
