# UI service
apiVersion: v1
kind: Service
metadata:
  name: ui
  namespace: retailstore
spec:
  type: ClusterIP
  selector:
    app: ui
  ports:
    - port: 80
      targetPort: 8080
---
# ADMIN service
apiVersion: v1
kind: Service
metadata:
  name: admin
  namespace: retailstore
spec:
  type: ClusterIP
  selector:
    app: admin
  ports:
    - port: 80
      targetPort: 8080
---
# POSTGRES service
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: retailstore
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
---
# REDIS service
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: retailstore
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
---
