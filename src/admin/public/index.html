<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de administración</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f2f5; color: #1a1a2e; }

    /* Login */
    #login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: white; padding: 2.5rem; border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.1); width: 360px;
    }
    .login-card h1 { font-size: 1.4rem; margin-bottom: .3rem; }
    .login-card p { color: #888; font-size: .9rem; margin-bottom: 2rem; }
    .field { display: flex; flex-direction: column; gap: .3rem; margin-bottom: 1rem; }
    label { font-size: .85rem; font-weight: 600; }
    input[type=text], input[type=password] {
      padding: .65rem .9rem; border: 1px solid #ddd; border-radius: 7px; font-size: .95rem;
    }
    input:focus { outline: none; border-color: #4f46e5; }
    .error-msg { color: #e94560; font-size: .85rem; min-height: 1.2em; }
    .btn-primary {
      width: 100%; background: #4f46e5; color: white; border: none;
      padding: .8rem; border-radius: 7px; cursor: pointer; font-size: 1rem; margin-top: .5rem;
    }
    .btn-primary:hover { background: #4338ca; }

    /* App shell */
    #app { display: none; min-height: 100vh; }
    nav {
      background: #1a1a2e; color: white; display: flex;
      align-items: center; padding: 0 1.5rem; height: 56px; gap: 1rem;
    }
    nav h1 { font-size: 1.1rem; flex: 1; }
    .nav-tab {
      background: none; border: none; color: rgba(255,255,255,.6);
      padding: .5rem .9rem; border-radius: 6px; cursor: pointer; font-size: .9rem;
    }
    .nav-tab.active, .nav-tab:hover { background: rgba(255,255,255,.12); color: white; }
    .nav-logout {
      background: none; border: 1px solid rgba(255,255,255,.3); color: white;
      padding: .4rem .9rem; border-radius: 6px; cursor: pointer; font-size: .85rem;
    }
    .nav-logout:hover { background: rgba(255,255,255,.1); }

    /* Content */
    .content { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }
    .section { display: none; }
    .section.active { display: block; }
    .section-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1.5rem;
    }
    .section-header h2 { font-size: 1.3rem; }
    .btn-add {
      background: #4f46e5; color: white; border: none;
      padding: .55rem 1.2rem; border-radius: 7px; cursor: pointer; font-size: .9rem;
    }
    .btn-add:hover { background: #4338ca; }

    /* Table */
    .card { background: white; border-radius: 10px; box-shadow: 0 2px 10px rgba(0,0,0,.06); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #f8f9fb; padding: .8rem 1rem; text-align: left; font-size: .8rem; text-transform: uppercase; letter-spacing: .05em; color: #888; border-bottom: 1px solid #eee; }
    td { padding: .85rem 1rem; border-bottom: 1px solid #f0f0f0; font-size: .9rem; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    .price-cell { font-weight: 600; color: #1a1a2e; }
    .actions { display: flex; gap: .5rem; }
    .btn-edit, .btn-delete {
      padding: .3rem .8rem; border-radius: 5px; border: none; cursor: pointer; font-size: .8rem;
    }
    .btn-edit { background: #e8f0fe; color: #4f46e5; }
    .btn-edit:hover { background: #d2e3fc; }
    .btn-delete { background: #fce8e8; color: #e94560; }
    .btn-delete:hover { background: #fad2d8; }
    .tags { display: flex; gap: .3rem; flex-wrap: wrap; }
    .tag { background: #e8f0fe; color: #4f46e5; padding: .15rem .5rem; border-radius: 10px; font-size: .75rem; }

    /* Orders */
    .order-row { cursor: pointer; }
    .order-detail { display: none; background: #f8f9fb; }
    .order-detail.open { display: table-row; }
    .order-detail td { padding: .5rem 1rem 1rem 2.5rem; }
    .items-table { width: 100%; font-size: .85rem; border-collapse: collapse; }
    .items-table th { background: transparent; text-transform: none; letter-spacing: 0; color: #555; font-weight: 600; padding: .3rem .5rem; }
    .items-table td { padding: .3rem .5rem; border: none; }
    .status-badge { background: #d1fae5; color: #065f46; padding: .2rem .7rem; border-radius: 10px; font-size: .75rem; font-weight: 600; }

    /* Modal */
    #modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 200; align-items: center; justify-content: center;
    }
    #modal-overlay.open { display: flex; }
    .modal {
      background: white; border-radius: 12px; padding: 2rem;
      width: 440px; max-width: 95vw;
    }
    .modal h3 { margin-bottom: 1.5rem; }
    .modal-actions { display: flex; gap: .8rem; margin-top: 1.5rem; justify-content: flex-end; }
    .btn-cancel {
      background: none; border: 1px solid #ddd; color: #555;
      padding: .6rem 1.2rem; border-radius: 7px; cursor: pointer;
    }
    .btn-save {
      background: #4f46e5; color: white; border: none;
      padding: .6rem 1.4rem; border-radius: 7px; cursor: pointer;
    }

    /* Toast */
    #toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      background: #1a1a2e; color: white; padding: .7rem 1.4rem;
      border-radius: 8px; font-size: .9rem; z-index: 300;
      opacity: 0; transition: opacity .25s; pointer-events: none;
    }
    #toast.show { opacity: 1; }
    .empty-state { padding: 3rem; text-align: center; color: #aaa; }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <h1>Panel de administración</h1>
    <p>Gestión de la tienda</p>
    <div class="field"><label>Usuario</label><input id="username" type="text" autocomplete="username" /></div>
    <div class="field"><label>Contraseña</label><input id="password" type="password" autocomplete="current-password" /></div>
    <div class="error-msg" id="login-error"></div>
    <button class="btn-primary" id="login-btn">Iniciar sesión</button>
  </div>
</div>

<!-- App -->
<div id="app">
  <nav>
    <h1>Panel de administración</h1>
    <button class="nav-tab active" data-section="products">Productos</button>
    <button class="nav-tab" data-section="orders">Órdenes</button>
    <button class="nav-logout" id="logout-btn">Cerrar sesión</button>
  </nav>
  <div class="content">

    <!-- Products -->
    <div class="section active" id="section-products">
      <div class="section-header">
        <h2>Productos</h2>
        <button class="btn-add" id="add-product-btn">+ Agregar producto</button>
      </div>
      <div class="card">
        <table id="products-table">
          <thead><tr><th>Nombre</th><th>Descripción</th><th>Precio</th><th>Categorías</th><th></th></tr></thead>
          <tbody id="products-body"><tr><td colspan="5" class="empty-state">Cargando…</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- Orders -->
    <div class="section" id="section-orders">
      <div class="section-header"><h2>Órdenes</h2></div>
      <div class="card">
        <table id="orders-table">
          <thead><tr><th></th><th>Cliente</th><th>Email</th><th>Fecha</th><th>Artículos</th><th>Total</th><th>Estado</th></tr></thead>
          <tbody id="orders-body"><tr><td colspan="7" class="empty-state">Cargando…</td></tr></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- Product modal -->
<div id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">Agregar producto</h3>
    <div class="field"><label>Nombre</label><input id="f-name" type="text" /></div>
    <div class="field"><label>Descripción</label><input id="f-desc" type="text" /></div>
    <div class="field"><label>Precio (centavos, ej. 2999 = $29.99)</label><input id="f-price" type="number" min="0" /></div>
    <div class="error-msg" id="modal-error"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="modal-cancel">Cancelar</button>
      <button class="btn-save" id="modal-save">Guardar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const $ = id => document.getElementById(id);

  function cents(n) { return '$' + (n / 100).toFixed(2); }
  function fmt(iso) { return new Date(iso).toLocaleString(); }

  function toast(msg, err = false) {
    const el = $('toast');
    el.textContent = msg;
    el.style.background = err ? '#e94560' : '#1a1a2e';
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2800);
  }

  async function api(url, opts = {}) {
    const res = await fetch(url, { headers: { 'Content-Type': 'application/json' }, ...opts });
    if (res.status === 401) { showLogin(); return null; }
    return res;
  }

  // ── Auth ────────────────────────────────────────────────────────────────

  function showLogin() {
    $('app').style.display = 'none';
    $('login-screen').style.display = 'flex';
    $('login-error').textContent = '';
  }

  function showApp() {
    $('login-screen').style.display = 'none';
    $('app').style.display = 'block';
  }

  $('login-btn').onclick = async () => {
    $('login-error').textContent = '';
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: $('username').value, password: $('password').value }),
    });
    if (res.ok) { showApp(); loadProducts(); }
    else { $('login-error').textContent = 'Credenciales inválidas'; }
  };

  $('password').addEventListener('keydown', e => { if (e.key === 'Enter') $('login-btn').click(); });

  $('logout-btn').onclick = async () => {
    await fetch('/auth/logout', { method: 'POST' });
    showLogin();
  };

  // ── Navigation ───────────────────────────────────────────────────────────

  document.querySelectorAll('.nav-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      btn.classList.add('active');
      const sec = btn.dataset.section;
      $(`section-${sec}`).classList.add('active');
      if (sec === 'products') loadProducts();
      if (sec === 'orders') loadOrders();
    });
  });

  // ── Products ─────────────────────────────────────────────────────────────

  let editingId = null;

  async function loadProducts() {
    const res = await api('/admin/api/products');
    if (!res) return;
    const products = await res.json();
    const tbody = $('products-body');
    if (!products.length) { tbody.innerHTML = '<tr><td colspan="5" class="empty-state">Sin productos aún.</td></tr>'; return; }
    tbody.innerHTML = products.map(p => `
      <tr>
        <td><strong>${esc(p.name)}</strong></td>
        <td style="max-width:260px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.description || '')}</td>
        <td class="price-cell">${cents(p.price)}</td>
        <td><div class="tags">${(p.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div></td>
        <td><div class="actions">
          <button class="btn-edit" onclick="openEdit('${esc(p.id)}','${esc(p.name)}',\`${esc(p.description||'')}\`,${p.price})">Editar</button>
          <button class="btn-delete" onclick="deleteProduct('${esc(p.id)}','${esc(p.name)}')">Eliminar</button>
        </div></td>
      </tr>
    `).join('');
  }

  function openAdd() {
    editingId = null;
    $('modal-title').textContent = 'Agregar producto';
    $('f-name').value = ''; $('f-desc').value = ''; $('f-price').value = '';
    $('modal-error').textContent = '';
    $('modal-overlay').classList.add('open');
    $('f-name').focus();
  }

  function openEdit(id, name, desc, price) {
    editingId = id;
    $('modal-title').textContent = 'Editar producto';
    $('f-name').value = name; $('f-desc').value = desc; $('f-price').value = price;
    $('modal-error').textContent = '';
    $('modal-overlay').classList.add('open');
    $('f-name').focus();
  }

  function closeModal() { $('modal-overlay').classList.remove('open'); }

  $('add-product-btn').onclick = openAdd;
  $('modal-cancel').onclick = closeModal;
  $('modal-overlay').onclick = e => { if (e.target === $('modal-overlay')) closeModal(); };

  $('modal-save').onclick = async () => {
    const name  = $('f-name').value.trim();
    const desc  = $('f-desc').value.trim();
    const price = parseInt($('f-price').value);
    if (!name || isNaN(price) || price < 0) { $('modal-error').textContent = 'Nombre y precio válido requeridos.'; return; }

    const url = editingId ? `/admin/api/products/${editingId}` : '/admin/api/products';
    const method = editingId ? 'PUT' : 'POST';
    const res = await api(url, { method, body: JSON.stringify({ name, description: desc, price }) });
    if (!res) return;
    if (!res.ok) { const e = await res.json(); $('modal-error').textContent = e.error || 'Error al guardar.'; return; }
    closeModal();
    toast(editingId ? 'Producto actualizado.' : 'Producto creado.');
    loadProducts();
  };

  async function deleteProduct(id, name) {
    if (!confirm(`¿Eliminar "${name}"? Esta acción no se puede deshacer.`)) return;
    const res = await api(`/admin/api/products/${id}`, { method: 'DELETE' });
    if (!res) return;
    toast('Producto eliminado.');
    loadProducts();
  }

  // ── Orders ────────────────────────────────────────────────────────────────

  async function loadOrders() {
    const res = await api('/admin/api/orders');
    if (!res) return;
    const orders = await res.json();
    const tbody = $('orders-body');
    if (!orders.length) { tbody.innerHTML = '<tr><td colspan="7" class="empty-state">Sin órdenes aún.</td></tr>'; return; }
    tbody.innerHTML = orders.map(o => {
      const total = (o.items || []).reduce((s, i) => s + (i.totalCost || 0), 0);
      const rowId = 'ord-' + o.id.replace(/-/g, '');
      return `
        <tr class="order-row" onclick="toggleOrder('${rowId}')">
          <td style="color:#aaa;font-size:.9rem">▶</td>
          <td><strong>${esc(o.first_name)} ${esc(o.last_name)}</strong></td>
          <td>${esc(o.email)}</td>
          <td style="white-space:nowrap">${fmt(o.created_at)}</td>
          <td>${(o.items || []).length}</td>
          <td class="price-cell">${cents(total)}</td>
          <td><span class="status-badge">Completado</span></td>
        </tr>
        <tr class="order-detail" id="${rowId}">
          <td colspan="7">
            <strong>ID de Orden:</strong> <code>${esc(o.id)}</code>
            &nbsp;|&nbsp; ${esc(o.address1)}, ${esc(o.city)}, ${esc(o.state)} ${esc(o.zip_code || '')}
            <br/><br/>
            <table class="items-table">
              <thead><tr><th>Producto</th><th>Cant.</th><th>Precio Unit.</th><th>Total</th></tr></thead>
              <tbody>
                ${(o.items || []).map(i => `
                  <tr>
                    <td>${esc(i.name || i.productId)}</td>
                    <td>${i.quantity}</td>
                    <td>${cents(i.unitCost || 0)}</td>
                    <td>${cents(i.totalCost || 0)}</td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </td>
        </tr>
      `;
    }).join('');
  }

  function toggleOrder(id) {
    const row = $(id);
    row.classList.toggle('open');
    const arrow = row.previousElementSibling.querySelector('td:first-child');
    arrow.textContent = row.classList.contains('open') ? '▼' : '▶';
  }

  // ── XSS helper ───────────────────────────────────────────────────────────
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // ── Init ─────────────────────────────────────────────────────────────────
  (async () => {
    const res = await fetch('/auth/me');
    if (res.ok) { showApp(); loadProducts(); }
    else showLogin();
  })();
</script>
</body>
</html>
