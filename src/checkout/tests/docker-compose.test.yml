services:
  checkout:
    build:
      context: ..
    environment:
      RETAIL_CHECKOUT_PERSISTENCE_PROVIDER: in-memory
      RETAIL_CHECKOUT_ENDPOINTS_ORDERS: ""   
      PORT: 8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      retries: 10