name: Bootstrap - Infra + Build + Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno a inicializar desde cero'
        required: true
        type: choice
        options:
          - develop
          - test
          - prod

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  terraform-bootstrap:
    name: "1/3 Terraform Bootstrap (ECR + Red + Cluster)"
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: true
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN:     ${{ secrets.AWS_SESSION_TOKEN }}
    defaults:
      run:
        working-directory: infra/environments/${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: Configurar credenciales AWS   # ← FALTA ESTE STEP
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Obtener Lambda Role ARN
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "LAMBDA_ROLE=arn:aws:iam::${ACCOUNT_ID}:role/LabRole" >> $GITHUB_ENV

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply — solo ECR, red y cluster
        run: |
          terraform apply -auto-approve \
            -target=module.app.module.networking \
            -target=module.app.module.ecr \
            -target=module.app.module.ecs \
            -target=module.app.module.alb \
            -target=module.app.module.internal_lb
        env:
          TF_VAR_postgres_user:    ${{ secrets.POSTGRES_USER }}
          TF_VAR_db_password:      ${{ secrets.DB_PASSWORD }}
          TF_VAR_admin_username:   ${{ secrets.ADMIN_USERNAME }}
          TF_VAR_admin_password:   ${{ secrets.ADMIN_PASSWORD }}
          TF_VAR_admin_jwt_secret: ${{ secrets.ADMIN_JWT_SECRET }}
          TF_VAR_lambda_role_arn:  ${{ env.LAMBDA_ROLE }}

  build-and-push:
    name: "2/3 Build & Push imágenes a ECR"
    needs: terraform-bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login a Amazon ECR
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY=$ACCOUNT_ID.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
            | docker login --username AWS --password-stdin $ECR_REGISTRY
          echo "ECR_REGISTRY=$ECR_REGISTRY" >> $GITHUB_ENV

      - name: Build & Push las 6 imágenes
        run: |
          declare -A CONTEXTS=(
            [catalog]=./src/catalog
            [carts]=./src/cart
            [orders]=./src/orders
            [checkout]=./src/checkout
            [ui]=./src/ui
            [admin]=./src/admin
          )
          ENV="${{ github.event.inputs.environment }}"

          for service in catalog carts orders checkout ui admin; do
            echo "▶ Build: $service"
            docker build -t "$service" "${CONTEXTS[$service]}"
            docker tag "$service:latest" \
              "$ECR_REGISTRY/retailstore-${ENV}/$service:latest"
            docker push \
              "$ECR_REGISTRY/retailstore-${ENV}/$service:latest"
            echo "✅ $service pushed"
          done
        
      - name: Empaquetar Lambda notifier
        run: |
          cd infra/lambda/alarm_notifier
          zip -j lambda_notifier.zip index.js
          cp lambda_notifier.zip ../../modules/cloudwatch/lambda_notifier.zip

      - name: Upload Lambda zip          
        uses: actions/upload-artifact@v4
        with:
          name: lambda-notifier
          path: infra/modules/cloudwatch/lambda_notifier.zip

  terraform-full:
    name: "3/3 Terraform Full (ECS services + todo)"
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: true
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN:     ${{ secrets.AWS_SESSION_TOKEN }}
    defaults:
      run:
        working-directory: infra/environments/${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Download Lambda zip       
        uses: actions/download-artifact@v4
        with:
          name: lambda-notifier
          path: infra/modules/cloudwatch/

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Obtener Lambda Role ARN    # ← NUEVO
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "LAMBDA_ROLE=arn:aws:iam::${ACCOUNT_ID}:role/LabRole" >> $GITHUB_ENV

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply — completo
        run: terraform apply -auto-approve
        env:
          TF_VAR_postgres_user:    ${{ secrets.POSTGRES_USER }}
          TF_VAR_db_password:      ${{ secrets.DB_PASSWORD }}
          TF_VAR_admin_username:   ${{ secrets.ADMIN_USERNAME }}
          TF_VAR_admin_password:   ${{ secrets.ADMIN_PASSWORD }}
          TF_VAR_admin_jwt_secret: ${{ secrets.ADMIN_JWT_SECRET }}
          TF_VAR_lambda_role_arn:  ${{ env.LAMBDA_ROLE }}