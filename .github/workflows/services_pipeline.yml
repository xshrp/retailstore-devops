name: Admin CI/CD

on:
  push:
    branches: ["main", "develop"]
    paths:
      - 'src/**'
  pull_request:
    branches: ["main", "develop"]
    paths:
      - 'src/**'
  workflow_dispatch:
    inputs:
      environment:
        description: "Entorno a desplegar (develop/test/prod)"
        required: true
        default: "develop"
        type: choice
        options:
          - develop
          - test
          - prod
      service_path:
        description: 'Ruta relativa del microservicio (ej: src/admin)'
        required: false
        default: 'src/admin'
      service_name:
        description: 'Nombre simple del servicio (ej: admin)'
        required: false
  workflow_call:
    inputs:
      environment:
        required: false
        type: string
      service_path:
        required: false
        type: string
      service_name:
        required: false
        type: string

permissions:
  security-events: write
  contents: read
  id-token: write

jobs:
  code-scan:
    name: Code Scan (Semgrep)
    runs-on: ubuntu-latest
    env:
      SERVICE_PATH: ${{ inputs.service_path || github.event.inputs.service_path || 'src/admin' }}
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config=auto \
            --sarif \
            --output=semgrep-results.sarif \
            ${{ env.SERVICE_PATH }}
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-results.sarif

  sonar-quality:
    name: Quality Gate (SonarCloud)
    runs-on: ubuntu-latest
    needs: code-scan
    env:
      SERVICE_PATH: ${{ inputs.service_path || github.event.inputs.service_path || 'src/admin' }}
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   

      - name: Análisis SonarCloud
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  sca-scan:
    name: Software Composition Analysis (Trivy filesystem)
    runs-on: ubuntu-latest
    needs: code-scan
    env:
      SERVICE_PATH: ${{ inputs.service_path || github.event.inputs.service_path || 'src/admin' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trivy SCA filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-targets: ${{ env.SERVICE_PATH }}
          format: sarif
          output: trivy-sca-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy SCA SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-sca-results.sarif

  build-and-push:
    name: Build & Push Admin Image to ECR
    runs-on: ubuntu-latest
    needs: [code-scan, sonar-quality, sca-scan]
    env:
      AWS_REGION: us-east-1
      SERVICE_PATH: ${{ inputs.service_path || github.event.inputs.service_path || 'src/admin' }}
      SERVICE_NAME: ${{ inputs.service_name || github.event.inputs.service_name || 'admin' }}
    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determinar entorno
        id: set-env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "test" ]; then
            echo "environment=test" >> $GITHUB_OUTPUT
          else
            echo "environment=develop" >> $GITHUB_OUTPUT
          fi

      - name: Derivar nombre de servicio (si no provisto)
        if: ${{ !inputs.service_name && !github.event.inputs.service_name }}
        run: |
          basename=$(basename "${{ env.SERVICE_PATH }}")
          echo "SERVICE_NAME=$basename" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag y push de imagen
        id: build
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ENV: ${{ steps.set-env.outputs.environment }}
          ECR_REPO: ${{ env.SERVICE_NAME }}-service-${{ steps.set-env.outputs.environment }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPO:$IMAGE_TAG"

          docker build \
            --label "git.sha=${{ github.sha }}" \
            --label "git.branch=${{ github.ref_name }}" \
            --label "build.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t "$IMAGE_URI" \
            -t "$REGISTRY/$ECR_REPO:latest" \
            ${{ env.SERVICE_PATH }}

          docker push "$IMAGE_URI"
          docker push "$REGISTRY/$ECR_REPO:latest"

          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

  image-scan:
    name: Image Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      AWS_REGION: us-east-1
      SERVICE_PATH: ${{ inputs.service_path || github.event.inputs.service_path || 'src/admin' }}
      SERVICE_NAME: ${{ inputs.service_name || github.event.inputs.service_name || 'admin' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build-and-push.outputs.image_uri }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  deploy:
    name: Deploy Admin Service to ECS
    runs-on: ubuntu-latest
    needs: [build-and-push, image-scan]
    env:
      AWS_REGION: us-east-1
      SERVICE_PATH: ${{ inputs.service_path || github.event.inputs.service_path || 'src/admin' }}
      SERVICE_NAME: ${{ inputs.service_name || github.event.inputs.service_name || 'admin' }}
    environment:
      name: ${{ needs.build-and-push.outputs.environment }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy nueva imagen en ECS
        env:
          ENV: ${{ needs.build-and-push.outputs.environment }}
          IMAGE_URI: ${{ needs.build-and-push.outputs.image_uri }}
          ECS_CLUSTER: ecs-cluster-${{ needs.build-and-push.outputs.environment }}
          ECS_SERVICE: ${{ env.SERVICE_NAME }}-service-${{ needs.build-and-push.outputs.environment }}
          ECS_TASK_FAMILY: ${{ env.SERVICE_NAME }}-service-${{ needs.build-and-push.outputs.environment }}
          CONTAINER_NAME: ${{ env.SERVICE_NAME }}-service
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment
