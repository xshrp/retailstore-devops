name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop, staging]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    name: Build artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.24

      - name: Build admin service
        working-directory: src/admin
        run: |
          npm install
          npm run build

      - name: Build ui service
        working-directory: src/ui
        run: |
          npm install
          npm run build

      - name: Build checkout service
        working-directory: src/checkout
        run: |
          yarn install
          yarn build

      - name: Build cart service
        working-directory: src/cart
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m compileall app

      - name: Build catalog service
        working-directory: src/catalog
        run: |
          go mod download
          go build -o catalog .

      - name: Build orders service
        working-directory: src/orders
        run: |
          go mod download
          go build -o orders .

  test:
    name: Run automated tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.24

      - name: Test admin service
        working-directory: src/admin
        run: |
          npm install
          npm run build

      - name: Test ui service
        working-directory: src/ui
        run: |
          npm install
          npm run build

      - name: Test checkout service
        working-directory: src/checkout
        run: |
          yarn install
          yarn test

      - name: Test cart service
        working-directory: src/cart
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m unittest discover -s app -p 'test*.py'

      - name: Test catalog service
        working-directory: src/catalog
        run: go test ./...

      - name: Test orders service
        working-directory: src/orders
        run: go test ./...

  quality:
    name: Code quality analysis
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.24

      - name: Type-check admin service
        working-directory: src/admin
        run: |
          npm install
          npx tsc --noEmit

      - name: Type-check ui service
        working-directory: src/ui
        run: |
          npm install
          npx tsc --noEmit

      - name: Type-check checkout service
        working-directory: src/checkout
        run: |
          yarn install
          yarn build

      - name: Lint cart service
        working-directory: src/cart
        run: |
          python -m pip install flake8
          python -m flake8 app || true

      - name: Lint catalog service
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          cd src/catalog && golangci-lint run ./...

      - name: Lint orders service
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          cd src/orders && golangci-lint run ./...

      - name: Run CodeQL analysis
        uses: github/codeql-action/init@v3
        with:
          languages: go, javascript, typescript, python

      - name: Autobuild for CodeQL
        uses: github/codeql-action/autobuild@v3

      - name: Analyze code with CodeQL
        uses: github/codeql-action/analyze@v3

  security:
    name: Security analysis
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.24

      - name: Audit admin dependencies
        working-directory: src/admin
        run: |
          npm install
          npm audit --audit-level=moderate

      - name: Audit ui dependencies
        working-directory: src/ui
        run: |
          npm install
          npm audit --audit-level=moderate

      - name: Audit checkout dependencies
        working-directory: src/checkout
        run: |
          yarn install
          yarn audit --level moderate

      - name: Audit cart Python dependencies
        run: |
          python -m pip install pip-audit
          python -m pip_audit --requirements src/cart/requirements.txt

      - name: Audit catalog and orders Go code
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          cd src/catalog && gosec ./...
          cd ../../src/orders && gosec ./...

  publish:
    name: Publish container images
    runs-on: ubuntu-latest
    needs: [quality, security]
    if: github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish admin image
        uses: docker/build-push-action@v5
        with:
          context: src/admin
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/obligatorio-devops-admin:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/obligatorio-devops-admin:latest

      - name: Publish ui image
        uses: docker/build-push-action@v5
        with:
          context: src/ui
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/obligatorio-devops-ui:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/obligatorio-devops-ui:latest

      - name: Publish checkout image
        uses: docker/build-push-action@v5
        with:
          context: src/checkout
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/obligatorio-devops-checkout:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/obligatorio-devops-checkout:latest

      - name: Publish cart image
        uses: docker/build-push-action@v5
        with:
          context: src/cart
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/obligatorio-devops-cart:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/obligatorio-devops-cart:latest

      - name: Publish catalog image
        uses: docker/build-push-action@v5
        with:
          context: src/catalog
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/obligatorio-devops-catalog:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/obligatorio-devops-catalog:latest

      - name: Publish orders image
        uses: docker/build-push-action@v5
        with:
          context: src/orders
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/obligatorio-devops-orders:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/obligatorio-devops-orders:latest

  deploy:
    name: Deploy to environment
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push'
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    steps:
      - name: Notify deploy environment
        run: |
          echo "Branch ${{ github.ref }} will deploy to ${{ job.environment.name }} environment."

      - name: Deploy using SSH
        if: ${{ secrets.DEPLOY_HOST != '' && secrets.SSH_PRIVATE_KEY != '' }}
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"
            docker compose -f /opt/retail/docker-compose.yml pull
            docker compose -f /opt/retail/docker-compose.yml up -d

      - name: Skip deploy if no target configured
        if: ${{ secrets.DEPLOY_HOST == '' || secrets.SSH_PRIVATE_KEY == '' }}
        run: |
          echo "Deployment is skipped because no remote host is configured."
          echo "Set DEPLOY_HOST, DEPLOY_USER, and SSH_PRIVATE_KEY secrets to enable remote deployment."
