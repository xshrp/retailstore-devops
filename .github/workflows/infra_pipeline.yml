name: Infrastructure Pipeline

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string       

jobs:
  terraform:
    name: Terraform ${{ inputs.environment }}
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: true
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN:     ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_REGION:            ${{ secrets.AWS_REGION }}   
    defaults:
      run:
        working-directory: infra/environments/${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Obtener Lambda Role ARN 
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "LAMBDA_ROLE=arn:aws:iam::${ACCOUNT_ID}:role/LabRole" >> $GITHUB_ENV

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan  
        continue-on-error: true
        env:
          TF_VAR_postgres_user:    ${{ secrets.POSTGRES_USER }}
          TF_VAR_db_password:      ${{ secrets.DB_PASSWORD }}
          TF_VAR_admin_username:   ${{ secrets.ADMIN_USERNAME }}
          TF_VAR_admin_password:   ${{ secrets.ADMIN_PASSWORD }}
          TF_VAR_admin_jwt_secret: ${{ secrets.ADMIN_JWT_SECRET }}
          TF_VAR_lambda_role_arn:  ${{ env.LAMBDA_ROLE }}

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `### Terraform Plan — \`${{ inputs.environment }}\`
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            *Autor: @${{ github.actor }}, Acción: \`${{ github.event_name }}\`*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Apply
        if: github.event_name != 'pull_request'
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_postgres_user:    ${{ secrets.POSTGRES_USER }}
          TF_VAR_db_password:      ${{ secrets.DB_PASSWORD }}
          TF_VAR_admin_username:   ${{ secrets.ADMIN_USERNAME }}
          TF_VAR_admin_password:   ${{ secrets.ADMIN_PASSWORD }}
          TF_VAR_admin_jwt_secret: ${{ secrets.ADMIN_JWT_SECRET }}
          TF_VAR_lambda_role_arn:  ${{ env.LAMBDA_ROLE }}