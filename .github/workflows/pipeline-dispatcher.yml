name: Test Dispatcher

on:
  workflow_dispatch:

env:
  ECS_CLUSTER: retailstore-develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configuracion de credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login a Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
          | docker login --username AWS --password-stdin \
          ${{ secrets.ECR_REGISTRY }}

      - name: Construccion y push de imagenes
        run: |
          SERVICES=(catalog carts orders checkout ui admin)

          for service in "${SERVICES[@]}"
          do
            echo "Building $service"

            docker build -t $service ./src/$service

            docker tag $service:latest \
              ${{ secrets.ECR_REGISTRY }}/retail-dev/$service:latest

            docker push \
              ${{ secrets.ECR_REGISTRY }}/retail-dev/$service:latest
          done

      - name: Despliegue de ECS services
        run: |
          SERVICES=(catalog carts orders checkout ui admin)

          for service in "${SERVICES[@]}"
          do
            echo "Desplegando: $service"

            aws ecs update-service \
              --cluster retailstore-develop \
              --service $service \
              --force-new-deployment
          done