name: Deploy RetailStore

on:
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1

    steps:
      - name: Descarga del repositorio
        uses: actions/checkout@v4

      - name: Configuracion de credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Instalacion de terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./infra/terraform/environments/develop
        run: terraform init

      - name: Terraform Validate
        working-directory: ./infra/terraform/environments/develop
        run: terraform validate

      - name: Terraform Plan
        working-directory: ./infra/terraform/environments/develop
        run: terraform plan

      - name: Terraform Apply
        working-directory: ./infra/terraform/environments/develop
        run: terraform apply -auto-approve


  deploy:
    needs: terraform
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1
      CLUSTER_NAME: retailstore-develop-eks

    steps:
      - name: Descarga del repositorio
        uses: actions/checkout@v4

      - name: Configuracion de credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Instalacion de kubectl
        uses: azure/setup-kubectl@v4

      - name: Configurar kubeconfig de EKS
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $CLUSTER_NAME

      - name: Esperar nodegroup
        run: |
          aws eks wait nodegroup-active \
            --cluster-name $CLUSTER_NAME \
            --nodegroup-name retailstore-develop-ng

      - name: Esperar nodos
        run: kubectl wait --for=condition=Ready nodes --all --timeout=600s

      - name: Instalar NGINX Ingress Controller (Si no existe)
        run: |
          kubectl get ns ingress-nginx >/dev/null 2>&1 || \
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.11.3/deploy/static/provider/cloud/deploy.yaml

      - name: Esperar Ingress Controller
        run: |
          kubectl wait --namespace ingress-nginx \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller \
            --timeout=600s

      - name: Dar permisos al script
        run: chmod +x ./infra/scripts/deploy-dev.sh

      - name: Instalar EBS CSI Driver
        run: |
          eksctl create addon \
            --name aws-ebs-csi-driver \
            --cluster $CLUSTER_NAME \
            --region $AWS_REGION || true

      - name: Ejecutar deploy Kubernetes
        run: ./infra/scripts/deploy-dev.sh

      - name: Debug cluster
        if: always()
        run: |
          kubectl get nodes
          kubectl get pods -A
          kubectl get svc -A
          kubectl get ingress -A