name: Deploy RetailStore

on:
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1

    steps:
      - name: Descarga del repositorio
        uses: actions/checkout@v4

      - name: Configuracion de credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Instalacion de terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform/environments/develop
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform/environments/develop
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform/environments/develop
        run: terraform plan

      - name: Terraform Apply
        working-directory: terraform/environments/develop
        run: terraform apply -auto-approve

  deploy:
    needs: terraform
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1
      CLUSTER_NAME: retailstore-develop-eks

    steps:
      - name: Descarga del repositorio
        uses: actions/checkout@v4

      - name: Configuracion de credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Instalacion de kubectl
        uses: azure/setup-kubectl@v4

      - name: Configuracion de acceso al cluster EKS
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $CLUSTER_NAME

      - name: Otorgar permisos al script de deploy
        run: chmod +x infra/scripts/deploy-dev.sh

      - name: Deploy de la aplicacion mediante script
        run: ./infra/scripts/deploy-dev.sh

      - name: Estado del cluster
        if: always()
        run: |
          kubectl get nodes
          kubectl get pods -A
          kubectl get svc -A
          kubectl get ingress -A